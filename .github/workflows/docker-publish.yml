name: Docker publish

# Builds Dockerfile.deploy and pushes to GHCR under the fork owner's namespace:
#   ghcr.io/<owner>/shengji
# Fully parameterized, so it works on any fork with no edits. Used by the
# "deploy from a prebuilt image" options (Render-from-image, Oracle Cloud VM).
#
# Pushes only on the default branch, version tags, and manual dispatch — PRs
# build but do NOT push. No extra secrets needed: the built-in GITHUB_TOKEN can
# push to the owner's GHCR.

on:
  push:
    branches: ["master", "main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (e.g. linux/amd64 or linux/amd64,linux/arm64)"
        required: false
        default: "linux/amd64"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/shengji
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.deploy
          # Default amd64 (Render/Fly). For an Oracle ARM VM, run this workflow
          # via "Run workflow" with platforms = linux/amd64,linux/arm64.
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
